<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel Software Badminton 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --viettel-red: #EE0000;
            --viettel-red-dark: #D10000;
            --bg-light: #F8F9FA;
            --text-dark: #1A1A1B;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            background-image: 
                linear-gradient(120deg, rgba(238, 0, 0, 0.02) 0%, transparent 50%),
                radial-gradient(circle at top right, rgba(238, 0, 0, 0.03), transparent 25%);
        }

        .font-saira { font-family: 'Saira', sans-serif; }

        .shadow-soft {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }

        .match-card {
            background: white;
            border-radius: 16px;
            transition: all 0.25s ease;
            border: 1px solid #E5E7EB;
        }

        .match-card:hover {
            border-color: var(--viettel-red);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -10px rgba(238, 0, 0, 0.1);
        }

        .score-input {
            width: 55px;
            height: 45px;
            background: #F3F4F6;
            border: 2px solid transparent;
            color: var(--text-dark);
            text-align: center;
            font-family: 'Saira', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .score-input:focus {
            outline: none;
            background: white;
            border-color: var(--viettel-red);
            box-shadow: 0 0 0 4px rgba(238, 0, 0, 0.1);
        }

        .table-header {
            background: var(--viettel-red);
            color: white;
        }

        .btn-reset {
            background: white;
            border: 1px solid #E5E7EB;
            color: #6B7280;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            border-color: var(--viettel-red);
            color: var(--viettel-red);
            background: rgba(238, 0, 0, 0.02);
        }

        .rank-row {
            border-bottom: 1px solid #F3F4F6;
        }

        .rank-row:last-child { border-bottom: none; }

        .medal-gold { color: #FFD700; }
        .medal-silver { color: #C0C0C0; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--viettel-red); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-[1440px] mx-auto">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row items-center justify-between mb-10 gap-6 border-b border-gray-200 pb-8">
            <div class="flex items-center gap-6">
                <div>
                    <h1 class="font-saira text-3xl md:text-4xl font-extrabold uppercase tracking-tight leading-none text-[#333]">
                        GIẢI CẦU LÔNG <span class="text-[#EE0000]">VIETTEL 2026</span>
                    </h1>
                    <p class="text-gray-500 font-medium text-sm mt-1 uppercase tracking-widest">Nội dung: Đôi Nam - Khối Phần Mềm</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden sm:block text-right">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Trạng thái giải đấu</p>
                    <div class="flex items-center justify-end gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        <span class="text-sm font-bold text-gray-700">KẾT QUẢ TRỰC TIẾP</span>
                    </div>
                </div>
                <button onclick="resetData()" class="btn-reset p-3 rounded-xl shadow-sm" title="Reset Dữ Liệu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT: Standings -->
            <aside class="lg:col-span-3 space-y-6">
                <!-- Bảng A -->
                <div class="bg-white rounded-2xl shadow-soft overflow-hidden border border-gray-100">
                    <div class="table-header px-5 py-4 flex justify-between items-center">
                        <h2 class="font-saira text-lg font-bold uppercase italic">BẢNG A</h2>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 21h-4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2z"/><path d="M6 21h4"/><path d="M14 21h4"/><path d="M18 7h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-2"/><path d="M6 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h2"/></svg>
                    </div>
                    <div id="rank-a-list" class="p-2">
                        <!-- JS Render -->
                    </div>
                </div>

                <!-- Bảng B -->
                <div class="bg-white rounded-2xl shadow-soft overflow-hidden border border-gray-100">
                    <div class="px-5 py-4 flex justify-between items-center bg-gray-800 text-white">
                        <h2 class="font-saira text-lg font-bold uppercase italic">BẢNG B</h2>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 21h-4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2z"/><path d="M6 21h4"/><path d="M14 21h4"/><path d="M18 7h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-2"/><path d="M6 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h2"/></svg>
                    </div>
                    <div id="rank-b-list" class="p-2">
                        <!-- JS Render -->
                    </div>
                </div>
            </aside>

            <!-- MIDDLE: Fixtures -->
            <main class="lg:col-span-5">
                <div class="bg-white rounded-2xl shadow-soft border border-gray-100 min-h-[600px]">
                    <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                        <h2 class="font-saira text-xl font-extrabold text-gray-800 uppercase italic">LỊCH THI ĐẤU VÀ KẾT QUẢ</h2>
                        <div class="px-3 py-1 bg-gray-100 rounded-full text-[10px] font-bold text-gray-500">VÒNG BẢNG</div>
                    </div>
                    <div id="match-container" class="p-6 max-h-[850px] overflow-y-auto space-y-8">
                        <!-- JS Render -->
                    </div>
                </div>
            </main>

            <!-- RIGHT: Knockout -->
            <section class="lg:col-span-4 space-y-6">
                <div class="bg-white rounded-2xl shadow-soft border border-gray-100 p-6">
                    <h2 class="font-saira text-xl font-extrabold text-[#EE0000] uppercase italic mb-8 flex items-center gap-3">
                        <div class="p-2 bg-red-50 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                        </div>
                        VÒNG LOẠI TRỰC TIẾP
                    </h2>

                    <div class="space-y-10">
                        <!-- Semi -->
                        <div class="space-y-4">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] border-l-4 border-[#EE0000] pl-3">BÁN KẾT (SEMI-FINALS)</label>
                            
                            <div class="space-y-3">
                                <!-- BK1 -->
                                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100 flex items-center justify-between gap-4">
                                    <div class="flex-1 space-y-3">
                                        <div class="flex items-center justify-between">
                                            <span id="sf1-t1-name" class="text-xs font-bold text-gray-400 truncate pr-2 italic">Chờ Nhất A</span>
                                            <input type="number" id="sf1-s1" onchange="updateKO('sf1-s1', this.value)" class="score-input">
                                        </div>
                                        <div class="flex items-center justify-between">
                                            <span id="sf1-t2-name" class="text-xs font-bold text-gray-400 truncate pr-2 italic">Chờ Nhì B</span>
                                            <input type="number" id="sf1-s2" onchange="updateKO('sf1-s2', this.value)" class="score-input">
                                        </div>
                                    </div>
                                </div>

                                <!-- BK2 -->
                                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100 flex items-center justify-between gap-4">
                                    <div class="flex-1 space-y-3">
                                        <div class="flex items-center justify-between">
                                            <span id="sf2-t1-name" class="text-xs font-bold text-gray-400 truncate pr-2 italic">Chờ Nhất B</span>
                                            <input type="number" id="sf2-s1" onchange="updateKO('sf2-s1', this.value)" class="score-input">
                                        </div>
                                        <div class="flex items-center justify-between">
                                            <span id="sf2-t2-name" class="text-xs font-bold text-gray-400 truncate pr-2 italic">Chờ Nhì A</span>
                                            <input type="number" id="sf2-s2" onchange="updateKO('sf2-s2', this.value)" class="score-input">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Final -->
                        <div class="pt-6 border-t-2 border-dashed border-gray-100">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] border-l-4 border-yellow-500 pl-3 block mb-4">CHUNG KẾT (GRAND FINAL)</label>
                            <div class="bg-white rounded-2xl p-6 border-2 border-yellow-400/30 shadow-lg relative">
                                <div class="absolute -top-3 left-6 bg-yellow-500 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase">Huy Chương Vàng</div>
                                
                                <div class="space-y-5 mt-2">
                                    <div class="flex flex-col items-center">
                                        <div id="final-t1-name" class="text-xs font-extrabold text-gray-800 text-center mb-3 min-h-[1.2rem]">...</div>
                                        <input type="number" id="f-s1" onchange="updateKO('f-s1', this.value)" class="score-input !w-full !h-14 !text-2xl !bg-[#EE0000] !text-white !rounded-xl">
                                    </div>
                                    <div class="font-saira text-center text-gray-300 font-black italic text-xl">VS</div>
                                    <div class="flex flex-col items-center">
                                        <input type="number" id="f-s2" onchange="updateKO('f-s2', this.value)" class="score-input !w-full !h-14 !text-2xl !bg-[#EE0000] !text-white !rounded-xl">
                                        <div id="final-t2-name" class="text-xs font-extrabold text-gray-800 text-center mt-3 min-h-[1.2rem]">...</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Bronze -->
                        <div class="space-y-4">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] border-l-4 border-orange-400 pl-3">TRANH HẠNG BA</label>
                            <div class="p-4 bg-orange-50/50 rounded-xl border border-orange-100 flex items-center justify-between gap-4">
                                <div class="text-center flex-1">
                                    <div id="bronze-t1-name" class="text-[9px] font-bold text-gray-500 mb-2">...</div>
                                    <input type="number" id="b-s1" onchange="updateKO('b-s1', this.value)" class="score-input !h-10 !w-12 !text-lg">
                                </div>
                                <div class="font-saira font-bold text-gray-300">VS</div>
                                <div class="text-center flex-1">
                                    <div id="bronze-t2-name" class="text-[9px] font-bold text-gray-500 mb-2">...</div>
                                    <input type="number" id="b-s2" onchange="updateKO('b-s2', this.value)" class="score-input !h-10 !w-12 !text-lg">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // Updated Teams based on user query
        const TEAMS_A = [
            { id: 'A1', name: 'Tạ Hữu Anh – Nguyễn Nhật Quang' },
            { id: 'A2', name: 'Nguyễn Văn Huy – Vũ Quang Hưng' },
            { id: 'A3', name: 'Đinh Anh Tuân – Nguyễn Cao Kỳ' },
            { id: 'A4', name: 'Nguyễn Bá Ngọc – Nguyễn Xuân Trường' },
            { id: 'A5', name: 'Nguyễn Xuân Phú – Nguyễn Đức Thắng' }
        ];

        const TEAMS_B = [
            { id: 'B1', name: 'Hà Thanh Lâm – Phạm Đức Duy' },
            { id: 'B2', name: 'Nguyễn Đức Trí – Nguyễn Thanh Thiên' },
            { id: 'B3', name: 'Phùng Đình Tuấn – Vũ Văn Trung' },
            { id: 'B4', name: 'Đàm Tuấn Khang – Tô Duy Tường' },
            { id: 'B5', name: 'Nguyễn Mạnh Hùng – Dư Văn An' }
        ];

        // 5 teams per group means 10 matches per group (Round Robin)
        const SCHEDULE = [
            { round: 1, matches: [{t1:'A1', t2:'A2'}, {t1:'B1', t2:'B2'}, {t1:'A3', t2:'A4'}] },
            { round: 2, matches: [{t1:'B3', t2:'B4'}, {t1:'A1', t2:'A3'}, {t1:'B1', t2:'B3'}] },
            { round: 3, matches: [{t1:'A2', t2:'A5'}, {t1:'B2', t2:'B5'}, {t1:'A4', t2:'A5'}] },
            { round: 4, matches: [{t1:'B1', t2:'B4'}, {t1:'A1', t2:'A4'}, {t1:'B3', t2:'B5'}] },
            { round: 5, matches: [{t1:'A2', t2:'A3'}, {t1:'B2', t2:'B3'}, {t1:'A3', t2:'A5'}] },
            { round: 6, matches: [{t1:'B1', t2:'B5'}, {t1:'A1', t2:'A5'}, {t1:'B2', t2:'B4'}] },
            { round: 7, matches: [{t1:'A2', t2:'A4'}, {t1:'B4', t2:'B5'}] }
        ];

        let fixtures = [];
        let knockoutScores = {
            'sf1-s1': 0, 'sf1-s2': 0, 'sf2-s1': 0, 'sf2-s2': 0,
            'f-s1': 0, 'f-s2': 0, 'b-s1': 0, 'b-s2': 0
        };

        const STORAGE_KEY = 'viettel_badminton_v6';

        function init() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if(saved) {
                const parsed = JSON.parse(saved);
                fixtures = parsed.fixtures;
                knockoutScores = parsed.knockoutScores;
            } else {
                SCHEDULE.forEach(r => {
                    r.matches.forEach(m => {
                        fixtures.push({ ...m, round: r.round, s1: 0, s2: 0 });
                    });
                });
            }
            renderFixtures();
            updateEverything();
        }

        function updateEverything() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ fixtures, knockoutScores }));
            const standings = calculateStandings();
            renderStandings(standings);
            updateBrackets(standings);
        }

        function resetData() {
            if(confirm("Bạn có chắc chắn muốn xóa toàn bộ kết quả đã nhập?")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function calculateStandings() {
            const process = (teams) => {
                let stats = teams.map(t => ({ ...t, wins: 0, diff: 0, played: 0 }));
                fixtures.forEach(m => {
                    if (m.s1 !== 0 || m.s2 !== 0) {
                        let t1 = stats.find(s => s.id === m.t1);
                        let t2 = stats.find(s => s.id === m.t2);
                        if(t1 && t2) {
                            t1.played++; t2.played++;
                            t1.diff += (m.s1 - m.s2);
                            t2.diff += (m.s2 - m.s1);
                            if(m.s1 > m.s2) t1.wins++;
                            else if(m.s2 > m.s1) t2.wins++;
                        }
                    }
                });
                return stats.sort((a,b) => b.wins - a.wins || b.diff - a.diff);
            };
            return { a: process(TEAMS_A), b: process(TEAMS_B) };
        }

        function renderStandings(data) {
            const draw = (id, list, prefix) => {
                const el = document.getElementById(id);
                el.innerHTML = list.map((t, i) => `
                    <div class="rank-row p-4 flex items-center hover:bg-gray-50 transition-colors">
                        <div class="font-saira font-black w-10 text-center text-lg ${i==0 ? 'medal-gold' : i==1 ? 'medal-silver' : 'text-gray-300'}">
                            ${prefix}${i+1}
                        </div>
                        <div class="flex-1 px-3 truncate">
                            <p class="text-[11px] font-bold text-gray-800 uppercase leading-none truncate">${t.name}</p>
                            <div class="mt-1.5 flex gap-3 text-[9px] font-black tracking-tight text-gray-400">
                                <span>THẮNG: <span class="text-[#EE0000]">${t.wins}</span></span>
                                <span>HIỆU SỐ: <span class="${t.diff >= 0 ? 'text-blue-500' : 'text-red-500'}">${t.diff > 0 ? '+' + t.diff : t.diff}</span></span>
                            </div>
                        </div>
                    </div>
                `).join('');
            };
            draw('rank-a-list', data.a, 'A');
            draw('rank-b-list', data.b, 'B');
        }

        function renderFixtures() {
            const container = document.getElementById('match-container');
            container.innerHTML = '';
            
            for(let r = 1; r <= 7; r++) {
                const roundMatches = fixtures.filter(m => m.round === r);
                if(roundMatches.length === 0) continue;

                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="flex items-center gap-4 mb-4">
                        <span class="font-saira text-xs font-extrabold text-[#EE0000] italic">VÒNG ${r}</span>
                        <div class="h-px bg-gray-100 flex-1"></div>
                    </div>
                    <div class="grid grid-cols-1 gap-3">
                        ${roundMatches.map(m => {
                            const idx = fixtures.findIndex(f => f.t1 === m.t1 && f.t2 === m.t2);
                            return `
                                <div class="match-card p-4 flex items-center justify-between">
                                    <div class="w-[40%]">
                                        <p class="text-[8px] font-bold text-gray-400 uppercase mb-1">${m.t1}</p>
                                        <p class="text-[10px] font-bold text-gray-800 uppercase leading-tight">${getTeamName(m.t1)}</p>
                                    </div>
                                    <div class="flex items-center gap-1.5">
                                        <input type="number" value="${m.s1}" onchange="updateScore(${idx}, 1, this.value)" class="score-input">
                                        <div class="w-1 h-1 rounded-full bg-gray-300"></div>
                                        <input type="number" value="${m.s2}" onchange="updateScore(${idx}, 2, this.value)" class="score-input">
                                    </div>
                                    <div class="w-[40%] text-right">
                                        <p class="text-[8px] font-bold text-gray-400 uppercase mb-1">${m.t2}</p>
                                        <p class="text-[10px] font-bold text-gray-800 uppercase leading-tight">${getTeamName(m.t2)}</p>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            }
        }

        function getTeamName(id) {
            const allTeams = [...TEAMS_A, ...TEAMS_B];
            const team = allTeams.find(t => t.id === id);
            return team ? team.name : "N/A";
        }

        function updateScore(idx, pos, val) {
            const v = parseInt(val) || 0;
            if(pos === 1) fixtures[idx].s1 = v;
            else fixtures[idx].s2 = v;
            updateEverything();
        }

        function updateKO(id, val) {
            knockoutScores[id] = parseInt(val) || 0;
            updateEverything();
        }

        function updateBrackets(standings) {
            const topA = standings.a.filter(t => t.played > 0);
            const topB = standings.b.filter(t => t.played > 0);

            // Semi-finals logic: 1A vs 2B, 1B vs 2A
            const sf1_t1 = topA[0], sf1_t2 = topB[1];
            const sf2_t1 = topB[0], sf2_t2 = topA[1];

            const syncTeam = (id, team, label) => {
                const el = document.getElementById(id);
                if(team) {
                    el.innerText = team.name;
                    el.classList.replace('text-gray-400', 'text-gray-800');
                } else {
                    el.innerText = label;
                    el.classList.replace('text-gray-800', 'text-gray-400');
                }
            };

            syncTeam('sf1-t1-name', sf1_t1, 'Chờ Nhất A');
            syncTeam('sf1-t2-name', sf1_t2, 'Chờ Nhì B');
            syncTeam('sf2-t1-name', sf2_t1, 'Chờ Nhất B');
            syncTeam('sf2-t2-name', sf2_t2, 'Chờ Nhì A');

            const pick = (s1k, s2k, t1, t2, winId, loseId) => {
                const s1 = knockoutScores[s1k], s2 = knockoutScores[s2k];
                const winEl = document.getElementById(winId);
                const loseEl = document.getElementById(loseId);
                if((s1 || s2) && t1 && t2) {
                    if(s1 > s2) {
                        winEl.innerText = t1.name;
                        loseEl.innerText = t2.name;
                    } else {
                        winEl.innerText = t2.name;
                        loseEl.innerText = t1.name;
                    }
                } else {
                    winEl.innerText = '...';
                    loseEl.innerText = '...';
                }
            };

            pick('sf1-s1', 'sf1-s2', sf1_t1, sf1_t2, 'final-t1-name', 'bronze-t1-name');
            pick('sf2-s1', 'sf2-s2', sf2_t1, sf2_t2, 'final-t2-name', 'bronze-t2-name');

            Object.keys(knockoutScores).forEach(k => {
                const el = document.getElementById(k);
                if(el) el.value = knockoutScores[k];
            });
        }

        window.onload = init;
    </script>
</body>
</html>
